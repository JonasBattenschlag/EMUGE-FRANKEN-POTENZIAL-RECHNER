<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EMUGE Potenzial-Kalkulator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            min-height: 100vh;
            color: white;
        }
        header {
            background: linear-gradient(90deg, #ea580c 0%, #c2410c 100%);
            padding: 20px;
            text-align: center;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
        }
        header h1 {
            font-size: 24px;
            font-weight: bold;
        }
        header p {
            font-size: 12px;
            opacity: 0.9;
        }
        .container {
            max-width: 600px;
            margin: 20px auto;
            padding: 20px;
        }
        .card {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 20px;
            box-shadow: 0 10px 15px rgba(0, 0, 0, 0.2);
        }
        .card h2 {
            font-size: 20px;
            margin-bottom: 16px;
            color: #22c55e;
        }
        .input-group {
            margin-bottom: 16px;
        }
        label {
            display: block;
            font-size: 12px;
            font-weight: bold;
            text-transform: uppercase;
            color: #94a3b8;
            margin-bottom: 8px;
            letter-spacing: 0.5px;
        }
        select, input {
            width: 100%;
            padding: 12px;
            background: #334155;
            border: 1px solid #475569;
            color: white;
            border-radius: 8px;
            font-size: 16px;
            font-family: inherit;
        }
        input:focus, select:focus {
            outline: none;
            border-color: #ea580c;
            box-shadow: 0 0 0 3px rgba(234, 88, 12, 0.1);
        }
        .result {
            background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
            border-radius: 12px;
            padding: 24px;
            text-align: center;
            margin-bottom: 20px;
        }
        .result-value {
            font-size: 48px;
            font-weight: 900;
            margin: 16px 0;
        }
        .result-class {
            font-size: 24px;
            font-weight: bold;
        }
        button {
            width: 100%;
            padding: 16px;
            background: #ea580c;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
            margin-top: 16px;
            min-height: 48px;
        }
        button:hover {
            background: #c2410c;
        }
        button:active {
            background: #92300c;
        }
        .breakdown {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            padding: 16px;
            margin-top: 16px;
            font-size: 14px;
        }
        .breakdown-item {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        .breakdown-item:last-child {
            border-bottom: none;
        }
        .hidden {
            display: none;
        }
        .button-group {
            display: flex;
            gap: 8px;
        }
        .button-group button {
            flex: 1;
            background: #334155;
            margin-top: 0;
        }
        .button-group button.active {
            background: #ea580c;
        }
    </style>
</head>
<body>
    <header>
        <h1>🔧 Potenzial-Kalkulator</h1>
        <p>EMUGE FRANKEN</p>
    </header>

    <div class="container">
        <div class="card">
            <h2>📊 Eingabe</h2>
            
            <div class="input-group">
                <label>🏭 Branche</label>
                <select id="industry" onchange="updateResult()">
                    <option value="auto">Automobil</option>
                    <option value="med">Medizintechnik</option>
                    <option value="luft">Luft- und Raumfahrt</option>
                    <option value="lohn">Lohnfertiger</option>
                </select>
            </div>

            <div class="input-group">
                <label>⚙️ Maschinentyp</label>
                <div class="button-group">
                    <button onclick="setMachineType('drehen')">🔄 Drehen</button>
                    <button onclick="setMachineType('frasen')">🔪 Fräsen</button>
                    <button onclick="setMachineType('both')" class="active">⚙️ Beide</button>
                </div>
            </div>

            <div class="input-group">
                <label>⚙️ CNC-Maschinen</label>
                <input type="number" id="machines" value="15" onchange="updateResult()" oninput="updateResult()">
            </div>

            <div class="input-group">
                <label>🔩 Material</label>
                <select id="material" onchange="updateResult()">
                    <option value="stahl">Stahl</option>
                    <option value="alu">Aluminium</option>
                    <option value="edel">Edelstahl</option>
                    <option value="titan">Titan</option>
                </select>
            </div>

            <div class="input-group">
                <label>⏰ Schichtmodell</label>
                <select id="shifts" onchange="updateResult()">
                    <option value="1">1 Schicht</option>
                    <option value="2">2 Schichten</option>
                    <option value="3">3 Schichten</option>
                </select>
            </div>
        </div>

        <div id="resultCard" class="result">
            <p style="font-size: 12px; opacity: 0.8;">Jahrespotenzial</p>
            <div class="result-value" id="resultValue">€ 75k</div>
            <div class="result-class" id="resultClass">Klasse B</div>
            <div class="breakdown" id="breakdown"></div>
        </div>

        <div class="card">
            <h2>👤 Kunde speichern</h2>
            <div class="input-group">
                <label>Kundenname</label>
                <input type="text" id="customerName" placeholder="z.B. Mayer GmbH">
            </div>
            <div class="input-group">
                <label>Kundennummer (optional)</label>
                <input type="text" id="customerNumber" placeholder="z.B. K-12345">
            </div>
            <button onclick="saveCustomer()">💾 Speichern</button>
        </div>
    </div>

    <script>
        let machineType = 'both';
        
        function setMachineType(type) {
            machineType = type;
            document.querySelectorAll('.button-group button').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');
            updateResult();
        }

        function updateResult() {
            const machines = parseFloat(document.getElementById('machines').value) || 0;
            const industry = document.getElementById('industry').value;
            const material = document.getElementById('material').value;
            const shifts = parseFloat(document.getElementById('shifts').value);

            const factors = {
                auto: 1.0, med: 1.2, luft: 1.3, lohn: 1.1
            };
            const materials = {
                stahl: 1.0, alu: 0.65, edel: 1.3, titan: 1.9
            };

            const potential = Math.round(
                machines * 5000 * shifts * materials[material] * factors[industry]
            );

            let klasse, color;
            if (potential >= 150000) { klasse = 'A'; color = '#10b981'; }
            else if (potential >= 75000) { klasse = 'B'; color = '#3b82f6'; }
            else if (potential >= 25000) { klasse = 'C'; color = '#eab308'; }
            else if (potential >= 5000) { klasse = 'D'; color = '#f97316'; }
            else { klasse = 'E'; color = '#6b7280'; }

            const distribution = {
                drehen: { gew: 0.45, fra: 0.15, boh: 0.25, spa: 0.15 },
                frasen: { gew: 0.10, fra: 0.45, boh: 0.25, spa: 0.20 },
                both: { gew: 0.25, fra: 0.25, boh: 0.25, spa: 0.25 }
            };

            const dist = distribution[machineType];
            const breakdown = {
                'Gewindetechnik': Math.round(potential * dist.gew),
                'Frästechnik': Math.round(potential * dist.fra),
                'Bohrtechnik': Math.round(potential * dist.boh),
                'Spanntechnik (Investment)': Math.round(potential * dist.spa)
            };

            document.getElementById('resultCard').style.background = `linear-gradient(135deg, ${color}dd 0%, ${color} 100%)`;
            document.getElementById('resultValue').textContent = `€ ${(potential / 1000).toFixed(0)}k`;
            document.getElementById('resultClass').textContent = `Klasse ${klasse}`;
            
            let breakdownHTML = '<strong>Werkzeug-Verteilung:</strong><br>';
            for (let [key, val] of Object.entries(breakdown)) {
                breakdownHTML += `<div class="breakdown-item"><span>${key}</span><strong>€ ${val.toLocaleString('de-DE')}</strong></div>`;
            }
            document.getElementById('breakdown').innerHTML = breakdownHTML;
        }

        function saveCustomer() {
            const name = document.getElementById('customerName').value;
            if (!name) {
                alert('Kundennamen eingeben!');
                return;
            }
            alert(`✅ Kunde "${name}" gespeichert!`);
            document.getElementById('customerName').value = '';
            document.getElementById('customerNumber').value = '';
        }

        updateResult();
    </script>
</body>
</html>
